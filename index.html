<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Budget & Investment Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        /* [Keeping your original CSS variables and styles for brevity] */
        :root {
            --bg: #000000; --surface: #0a0a0a; --surface2: #111111; --text: #f0f0ef;
            --muted: #666870; --green: #1adb8a; --red: #f05050; --radius: 14px;
        }
        body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        .header { background: #000; border-bottom: 1.5px solid rgba(255,255,255,0.1); padding: 1rem; display: flex; justify-content: space-between; align-items: center; sticky; top: 0; z-index: 100; }
        .main { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
        .card { background: var(--surface); border: 1.5px solid rgba(255,255,255,0.1); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
        .tab-nav { display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab-btn { background: none; border: none; color: var(--muted); padding: 10px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { color: var(--green); border-bottom: 2px solid var(--green); }
        .inv-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 1rem; }
        /* [Remaining Styles omitted for space, identical to your original] */
        .goal-track { height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin: 8px 0; }
        .goal-fill { height: 100%; transition: width 0.5s ease; }
    </style>
</head>
<body>

<header class="header">
    <div style="font-weight: 700; font-size: 1.2rem;">budget<span>.</span>track</div>
    <div id="live-status" style="font-size: 11px; font-family: 'DM Mono'; color: var(--muted);">Local Mode (Private)</div>
</header>

<main class="main">
    <nav class="tab-nav">
        <button class="tab-btn active" id="tab-budget" onclick="switchTab('budget')">Budget</button>
        <button class="tab-btn" id="tab-inv" onclick="switchTab('inv')">Investments</button>
    </nav>

    <div id="budget-page">
        <div class="card">
            <h3>Monthly Spending</h3>
            <canvas id="spend-chart" style="max-height: 200px;"></canvas>
        </div>
        <div class="card">
            <input type="number" id="inp-amount" placeholder="Amount">
            <input type="text" id="inp-reason" placeholder="Reason">
            <button onclick="addEntry()" style="background: var(--green); color: black; border:none; padding: 10px; border-radius: 8px; width: 100%;">Add Entry</button>
        </div>
    </div>

    <div id="inv-page" style="display:none;">
        <div class="inv-grid">
            <div class="card">
                <div style="font-size: 10px; color: var(--muted);">CURRENT VALUE</div>
                <div id="inv-current-value" style="font-size: 24px; font-weight: 700;">₹0</div>
            </div>
            <div class="card">
                <div style="font-size: 10px; color: var(--muted);">TOTAL RETURNS</div>
                <div id="inv-returns-amt" style="font-size: 24px; font-weight: 700;">₹0</div>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>Portfolio Holdings</h3>
                <button onclick="runLivePriceUpdate(true)" style="background: transparent; color: #a78bfa; border: 1px solid #a78bfa; padding: 5px 12px; border-radius: 20px; font-size: 11px; cursor: pointer;">Refresh Live Prices</button>
            </div>
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; margin-top: 1rem;">
                    <thead><tr style="text-align: left; color: var(--muted); font-size: 10px;"><th>ASSET</th><th>VALUE</th><th>RETURNS</th></tr></thead>
                    <tbody id="inv-tbody"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h3>Investment Goals</h3>
            <div id="goal-container"></div>
            <button onclick="openGoalModal()" style="margin-top: 10px; background: #333; color: white; border:none; padding: 8px; border-radius: 4px; cursor: pointer;">+ Add New Goal</button>
        </div>
    </div>
</main>

<script>
// --- CONFIG & STATE ---
let entries = JSON.parse(localStorage.getItem('bt2_entries')) || [];
let invHoldings = JSON.parse(localStorage.getItem('inv_holdings')) || [];
let invGoals = JSON.parse(localStorage.getItem('inv_goals')) || [];

const fmt = (n) => '₹' + Math.round(n).toLocaleString('en-IN');

function switchTab(tab) {
    document.getElementById('budget-page').style.display = tab === 'budget' ? 'block' : 'none';
    document.getElementById('inv-page').style.display = tab === 'inv' ? 'block' : 'none';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + (tab === 'inv' ? 'inv' : 'budget')).classList.add('active');
    if(tab === 'inv') renderInv();
}

// --- ERROR FIX: Defensive Element Setting ---
function safeSetText(id, text) {
    const el = document.getElementById(id);
    if (el) el.textContent = text;
}

function showLiveStatus(msg, color) {
    const el = document.getElementById('live-status');
    if (el) {
        el.textContent = msg;
        el.style.color = color || 'var(--muted)';
    }
}

// --- RENDER FUNCTIONS ---
function renderInv() {
    const totalInvested = invHoldings.reduce((s, h) => s + h.invested, 0);
    const totalCurrent = invHoldings.reduce((s, h) => s + h.current, 0);
    const returns = totalCurrent - totalInvested;

    safeSetText('inv-total-invested', fmt(totalInvested));
    safeSetText('inv-current-value', fmt(totalCurrent));
    safeSetText('inv-returns-amt', (returns >= 0 ? '+' : '') + fmt(returns));
    
    const tbody = document.getElementById('inv-tbody');
    if(tbody) {
        tbody.innerHTML = invHoldings.map(h => `
            <tr style="border-bottom: 1px solid #111;">
                <td style="padding: 12px 0;">${h.name}<br><small style="color:var(--muted)">${h.type}</small></td>
                <td>${fmt(h.current)}</td>
                <td style="color:${h.current >= h.invested ? 'var(--green)' : 'var(--red)'}">${Math.round(((h.current-h.invested)/h.invested)*100)}%</td>
            </tr>
        `).join('');
    }
    renderGoals();
}

function renderGoals() {
    const container = document.getElementById('goal-container');
    if (!container) return;
    if (invGoals.length === 0) {
        container.innerHTML = '<p style="color:var(--muted); font-size:12px;">No goals set.</p>';
        return;
    }
    container.innerHTML = invGoals.map(g => {
        const pct = Math.min(100, (g.saved / g.target) * 100);
        return `
            <div style="margin-bottom: 15px;">
                <div style="display:flex; justify-content:space-between; font-size:13px;"><span>${g.name}</span><span>${Math.round(pct)}%</span></div>
                <div class="goal-track"><div style="width:${pct}%; background:var(--green); height:100%;"></div></div>
                <div style="font-size:10px; color:var(--muted)">${fmt(g.saved)} of ${fmt(g.target)}</div>
            </div>`;
    }).join('');
}

// --- PRIVACY-FIRST PRICE UPDATER ---
async function runLivePriceUpdate(force = false) {
    if (!force) return;
    showLiveStatus("Updating prices (Private Fetch)...", "#a78bfa");

    const MF_MAP = { 1800000000004: 122639 }; // Parag Parikh Example
    
    for (let h of invHoldings) {
        if (h.type === 'Mutual Fund' && MF_MAP[h.id]) {
            try {
                const response = await fetch(`https://api.mfapi.in/mf/${MF_MAP[h.id]}/latest`);
                const data = await response.json();
                if (data.data && data.data[0]) {
                    const nav = parseFloat(data.data[0].nav);
                    const units = h.invested / h.lastNav || 0; // Simple unit est
                    if(units > 0) h.current = Math.round(units * nav);
                }
            } catch (e) { console.error("Price fetch failed", e); }
        }
    }
    localStorage.setItem('inv_holdings', JSON.stringify(invHoldings));
    renderInv();
    showLiveStatus("Last updated: Just now", "var(--green)");
}

// Initialize
window.onload = () => {
    switchTab('budget');
};
</script>
</body>
</html>
