<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Budget & Investment Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #000000; --surface: #0a0a0a; --surface2: #111111; --surface3: #181818;
  --border: rgba(255,255,255,0.08); --text: #f0f0ef; --muted: #666870;
  --green: #1adb8a; --red: #f05050; --purple: #a78bfa; --radius: 14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-text-size-adjust:100%;overflow-x:hidden;}

/* HEADER & TABS */
.header{background:#000;border-bottom:1.5px solid var(--border);padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;}
.logo{font-size:17px;font-weight:700;letter-spacing:-0.02em;}
.logo span{color:var(--green);}
.tab-nav{background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);border-bottom:1.5px solid var(--border);display:flex;padding:0 1.25rem;position:sticky;top:58px;z-index:99;}
.tab-btn{background:none;border:none;border-bottom:2.5px solid transparent;padding:12px 18px;font-family:'Syne';font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green);}
.tab-btn.inv-tab.active{color:var(--purple);border-bottom-color:var(--purple);}

/* MAIN & CARDS */
.main{max-width:960px;margin:0 auto;padding:1.5rem 1.25rem 5rem;}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;box-shadow:inset 0 1px 0 rgba(255,255,255,0.05);}
.section-label{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;}

/* GRID */
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem;}
.stat-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;}
.c-green{color:var(--green);} .c-red{color:var(--red);} .c-purple{color:var(--purple);}

/* FORM */
.form-group{margin-bottom:12px;}
.form-group label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;}
input, select{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:12px;color:#fff;font-family:'Syne';outline:none;}
input:focus{border-color:var(--green);}
.btn-primary{width:100%;background:var(--green);color:#000;border:none;padding:14px;border-radius:8px;font-weight:700;cursor:pointer;font-family:'Syne';}

/* TABLES */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;color:var(--muted);padding:10px 0;font-size:10px;text-transform:uppercase;}
td{padding:12px 0;border-bottom:1px solid var(--border);}

/* GOALS */
.goal-row{margin-bottom:15px;}
.goal-track{height:6px;background:var(--surface3);border-radius:10px;overflow:hidden;margin:6px 0;}
.goal-fill{height:100%;background:var(--green);transition:width 0.8s ease;}

@media(max-width:600px){ .grid-3{grid-template-columns:1fr;} }
</style>
</head>
<body>

<header class="header">
  <div class="logo">budget<span>.</span>track</div>
  <div id="live-status" style="font-size:10px; font-family:'DM Mono'; color:var(--muted)">Local Mode (Private)</div>
</header>

<nav class="tab-nav">
  <button class="tab-btn active" id="tab-budget" onclick="switchTab('budget')">Budget Tracker</button>
  <button class="tab-btn inv-tab" id="tab-inv" onclick="switchTab('inv')">Investment Tracker</button>
</nav>

<main class="main">
  <div id="budget-page">
    <div class="section-label">Overview</div>
    <div class="grid-3">
      <div class="card">
        <div class="section-label" style="font-size:8px">Total Budget</div>
        <div class="stat-val c-green" id="val-budget">₹68,000</div>
      </div>
      <div class="card">
        <div class="section-label" style="font-size:8px">Spent</div>
        <div class="stat-val c-red" id="val-spent">₹0</div>
      </div>
      <div class="card">
        <div class="section-label" style="font-size:8px">Balance</div>
        <div class="stat-val" id="val-balance">₹0</div>
      </div>
    </div>

    <div class="card">
      <div class="section-label">Spending by Category</div>
      <div style="height:200px; position:relative;">
        <canvas id="spend-chart"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="section-label">Add Expenditure</div>
      <div class="form-group">
        <input type="number" id="inp-amount" placeholder="Amount (₹)">
      </div>
      <div class="form-group">
        <input type="text" id="inp-reason" placeholder="Reason (e.g. Rent)">
      </div>
      <button class="btn-primary" onclick="addEntry()">+ Add Entry</button>
    </div>
  </div>

  <div id="inv-page" style="display:none;">
    <div class="section-label">Portfolio Summary</div>
    <div class="grid-3">
      <div class="card">
        <div class="section-label" style="font-size:8px">Invested</div>
        <div class="stat-val" id="inv-total-invested">₹0</div>
      </div>
      <div class="card">
        <div class="section-label" style="font-size:8px">Current Value</div>
        <div class="stat-val c-purple" id="inv-current-value">₹0</div>
      </div>
      <div class="card">
        <div class="section-label" style="font-size:8px">Total Returns</div>
        <div class="stat-val" id="inv-returns-amt">₹0</div>
      </div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
        <div class="section-label" style="margin:0">Holdings</div>
        <button onclick="runLivePriceUpdate(true)" style="background:rgba(167,139,250,0.1); border:1px solid var(--purple); color:var(--purple); padding:6px 12px; border-radius:20px; font-size:10px; cursor:pointer;">Refresh Prices</button>
      </div>
      <table>
        <thead><tr><th>Asset</th><th>Current</th><th>Returns</th></tr></thead>
        <tbody id="inv-tbody"></tbody>
      </table>
    </div>

    <div class="card">
      <div class="section-label">Goals Progress</div>
      <div id="goal-container"></div>
    </div>
  </div>
</main>

<script>
// --- STATE ---
let entries = JSON.parse(localStorage.getItem('bt2_entries')) || [];
let invHoldings = JSON.parse(localStorage.getItem('inv_holdings')) || [];
let invGoals = JSON.parse(localStorage.getItem('inv_goals')) || [];
let chartObj = null;

// --- UTILS ---
const fmt = (n) => '₹' + Math.round(n).toLocaleString('en-IN');
const safeSet = (id, val) => { const el = document.getElementById(id); if(el) el.textContent = val; };

function switchTab(tab) {
  document.getElementById('budget-page').style.display = tab === 'budget' ? 'block' : 'none';
  document.getElementById('inv-page').style.display = tab === 'inv' ? 'block' : 'none';
  document.getElementById('tab-budget').className = 'tab-btn' + (tab === 'budget' ? ' active' : '');
  document.getElementById('tab-inv').className = 'tab-btn inv-tab' + (tab === 'inv' ? ' active' : '');
  if(tab === 'inv') renderInv(); else renderBudget();
}

// --- BUDGET LOGIC ---
function addEntry() {
  const amt = parseFloat(document.getElementById('inp-amount').value);
  const reason = document.getElementById('inp-reason').value;
  if(!amt || !reason) return;
  entries.unshift({ id: Date.now(), amount: amt, reason: reason, date: new Date().toLocaleDateString() });
  localStorage.setItem('bt2_entries', JSON.stringify(entries));
  document.getElementById('inp-amount').value = '';
  document.getElementById('inp-reason').value = '';
  renderBudget();
}

function renderBudget() {
  const spent = entries.reduce((s, e) => s + e.amount, 0);
  const budget = 68000;
  safeSet('val-spent', fmt(spent));
  safeSet('val-budget', fmt(budget));
  safeSet('val-balance', fmt(budget - spent));
  renderChart(spent, budget);
}

function renderChart(spent, total) {
  const ctx = document.getElementById('spend-chart');
  if(!ctx) return;
  if(chartObj) chartObj.destroy();
  chartObj = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Spent', 'Remaining'],
      datasets: [{
        data: [spent, Math.max(0, total - spent)],
        backgroundColor: ['#f05050', '#1adb8a'],
        borderWidth: 0, cutout: '80%'
      }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });
}

// --- INVESTMENT LOGIC ---
function renderInv() {
  const invested = invHoldings.reduce((s, h) => s + h.invested, 0);
  const current = invHoldings.reduce((s, h) => s + h.current, 0);
  const returns = current - invested;

  safeSet('inv-total-invested', fmt(invested));
  safeSet('inv-current-value', fmt(current));
  safeSet('inv-returns-amt', (returns >= 0 ? '+' : '') + fmt(returns));

  const tbody = document.getElementById('inv-tbody');
  if(tbody) {
    tbody.innerHTML = invHoldings.map(h => `
      <tr>
        <td>${h.name}</td>
        <td class="stat-val" style="font-size:13px">${fmt(h.current)}</td>
        <td style="color:${h.current >= h.invested ? 'var(--green)' : 'var(--red)'}">${Math.round(((h.current-h.invested)/h.invested)*100)}%</td>
      </tr>`).join('');
  }
  renderGoals();
}

function renderGoals() {
  const container = document.getElementById('goal-container');
  if(!container) return;
  container.innerHTML = invGoals.map(g => {
    const pct = Math.min(100, (g.saved / g.target) * 100);
    return `
      <div class="goal-row">
        <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px;">
          <span>${g.name}</span><span>${Math.round(pct)}%</span>
        </div>
        <div class="goal-track"><div class="goal-fill" style="width:${pct}%"></div></div>
      </div>`;
  }).join('');
}

async function runLivePriceUpdate(force) {
  if(!force) return;
  const status = document.getElementById('live-status');
  if(status) status.textContent = "Updating prices privately...";
  
  // Example MF API Fetch
  for (let h of invHoldings) {
    if (h.type === 'Mutual Fund' && h.schemeCode) {
      try {
        const res = await fetch(`https://api.mfapi.in/mf/${h.schemeCode}/latest`);
        const data = await res.json();
        if(data.data[0]) h.current = (h.invested / h.lastNav) * parseFloat(data.data[0].nav);
      } catch(e) {}
    }
  }
  localStorage.setItem('inv_holdings', JSON.stringify(invHoldings));
  renderInv();
  if(status) status.textContent = "Last updated: Just now";
}

window.onload = () => renderBudget();
</script>
</body>
</html>
